services:
  xdr-mock:
    build: .
    image: trustguard-xdr-mock:latest
    container_name: trustguard-xdr-mock
    environment:
      # 指向挂载点内的 DataOpenDocument；OpenAPIDocument 作为兄弟目录一并可见
      XDR_DATA_ROOT: /data/DataOpenDocument
      XDR_STATE_DB_PATH: /state/xdr_mock.sqlite3
      XDR_MOCK_ADMIN_TOKEN: ${XDR_MOCK_ADMIN_TOKEN:-mock_admin_token_change_me}
    volumes:
      # 规范数据只读挂载，不打入镜像。默认按 README 的同级目录布局。
      - ../trustguard-docs/xdr-api-data-specs:/data:ro
      - xdr-mock-state:/state
    ports:
      - "8443:8443"
    restart: unless-stopped

volumes:
  xdr-mock-state:
